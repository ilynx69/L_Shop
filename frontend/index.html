<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L_Shop - Зеленый магазин</title>
    <style>
        /* Основные цвета */
        :root {
            --dark-green: #1a3b2e;
            --medium-green: #2a5a45;
            --light-green: #3d7a5c;
            --accent-gold: #c6a15b;
            --text-light: #f0f0f0;
            --text-dark: #222;
            --bg-light: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Навигация */
        nav {
            background: linear-gradient(135deg, var(--dark-green), var(--medium-green));
            padding: 15px 30px;
            box-shadow: 0 4px 10px rgba(0, 20, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            margin-right: 15px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        nav a:hover {
            background-color: var(--accent-gold);
            color: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        #app {
            flex: 1;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Заголовки */
        h1 {
            color: var(--dark-green);
            font-size: 2.5rem;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent-gold);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Карточки товаров */
        .product-card {
            background: white;
            border: none;
            border-radius: 15px;
            padding: 20px;
            margin: 15px;
            width: 250px;
            box-shadow: 0 5px 15px rgba(0, 40, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--dark-green), var(--accent-gold));
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(26, 59, 46, 0.3);
        }

        .product-card h3 {
            color: var(--dark-green);
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .product-card p {
            margin: 8px 0;
            color: #555;
        }

        .product-card p[data-price] {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--medium-green);
        }

        .product-card input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 16px;
        }

        .product-card button {
            background: linear-gradient(135deg, var(--medium-green), var(--dark-green));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .product-card button:hover {
            background: linear-gradient(135deg, var(--accent-gold), #b38f4a);
            transform: scale(1.05);
        }

        /* Корзина */
        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 3px 10px rgba(26, 59, 46, 0.1);
            border-left: 5px solid var(--accent-gold);
            transition: transform 0.2s;
        }

        .cart-item:hover {
            transform: translateX(5px);
        }

        .cart-item h4 {
            color: var(--dark-green);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .cart-item p[data-price="basket"] {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--medium-green);
        }

        .cart-item button {
            background: var(--medium-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 0 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .cart-item button:hover {
            background: var(--accent-gold);
            color: var(--dark-green);
        }

        .cart-item button:last-child {
            background: #c0392b;
        }

        .cart-item button:last-child:hover {
            background: #e74c3c;
            color: white;
        }

        /* Фильтры и поиск */
        input[type="text"], select {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--medium-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(42, 90, 69, 0.2);
        }

        select {
            background-color: white;
            cursor: pointer;
        }

        .filters-container {
            background: linear-gradient(to right, #f0f7f3, #e0eee5);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .filters-container > div {
            flex: 1 1 200px;
        }

        label {
            font-weight: 600;
            color: var(--dark-green);
            margin-right: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--medium-green);
            margin-right: 5px;
        }

        /* Общая сумма в корзине */
        .cart-total {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-green);
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-align: right;
            border-right: 5px solid var(--accent-gold);
        }

        /* Сообщения */
        .empty-cart, .auth-message {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            color: #666;
            font-size: 1.2rem;
        }

        .empty-cart a, .auth-message a {
            color: var(--medium-green);
            font-weight: bold;
            text-decoration: none;
        }

        .empty-cart a:hover, .auth-message a:hover {
            text-decoration: underline;
            color: var(--accent-gold);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card, .cart-item {
            animation: fadeIn 0.5s ease-out;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .product-card {
                width: 100%;
                margin: 10px 0;
            }
            
            nav {
                text-align: center;
            }
            
            nav a {
                display: inline-block;
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
