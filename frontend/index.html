<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L_Shop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        nav { margin-bottom: 20px; padding: 10px; background: #f0f0f0; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        .product-card { border: 1px solid #ccc; padding: 10px; margin: 10px; width: 220px; display: inline-block; vertical-align: top; }
        .cart-item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        button { cursor: pointer; margin: 0 5px; }
        input[type="number"] { width: 60px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
